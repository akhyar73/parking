<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Slot Parkir Kosong</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f7f7f7;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            padding: 24px;
            width: 100%;
            max-width: 460px;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .title {
            color: #333;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .check-button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
        }

        .check-button:hover {
            background-color: #2563eb;
        }

        .check-button:active {
            transform: translateY(1px);
        }

        .check-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 16px 0;
            color: #555;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 2px solid #eee;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto 6px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .slots-container {
            display: none;
        }

        .slots-container.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        .slots-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .slot-item {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .slot-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: #10b981;
        }

        .slot-item:hover {
            border-color: #d1d5db;
            transform: translateY(-1px);
        }

        .slot-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            padding-left: 4px;
        }

        .slot-status {
            font-size: 13px;
            font-weight: 500;
            padding: 3px 8px;
            border-radius: 3px;
            align-self: flex-start;
            margin-left: 4px;
            background: #ecfdf5;
            color: #047857;
        }

        .summary {
            background: #f9fafb;
            border-radius: 4px;
            padding: 14px;
            margin-top: 10px;
            border: 1px solid #e5e7eb;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 13px;
            color: #4b5563;
        }

        .summary-item:last-child {
            margin-bottom: 0;
            font-weight: 600;
            font-size: 14px;
            color: #111827;
            padding-top: 4px;
            border-top: 1px dashed #e5e7eb;
        }

        .last-update {
            text-align: center;
            margin-top: 14px;
            font-size: 12px;
            color: #6b7280;
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fee2e2;
            color: #b91c1c;
            padding: 10px;
            border-radius: 4px;
            margin-top: 14px;
            display: none;
            font-size: 13px;
        }

        .error-message.active {
            display: block;
        }

        .refresh-info {
            background: #f0f9ff;
            border: 1px solid #e0f2fe;
            color: #0c4a6e;
            padding: 8px 10px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 12px;
        }

        .no-slots-message {
            text-align: center;
            padding: 20px;
            background: #fef2f2;
            color: #b91c1c;
            border-radius: 4px;
            margin-bottom: 16px;
            display: none;
        }

        .no-slots-message.active {
            display: block;
        }

        @media (max-width: 480px) {
            .container {
                padding: 16px;
            }
            
            .title {
                font-size: 18px;
            }
            
            .slots-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">Cek Slot Parkir Kosong</h1>
            <button class="check-button" id="checkButton" onclick="checkParkingSlots()">
                Cek Slot Parkir
            </button>
        </div>

        <div class="refresh-info">
            💡 Klik tombol "Cek Slot Parkir" untuk mendapatkan informasi terbaru
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Mengecek slot parkir...</p>
        </div>

        <div class="error-message" id="errorMessage">
            <strong>Error:</strong> <span id="errorText"></span>
        </div>

        <div class="slots-container" id="slotsContainer">
            <div id="noSlotsMessage" class="no-slots-message">
                <p>Tidak ada slot parkir yang tersedia saat ini.</p>
            </div>
            
            <div id="slotsList" class="slots-grid"></div>
            
            <div class="summary" id="summary">
                <div class="summary-item">
                    <span>Total Slot:</span>
                    <span id="totalSlots">6</span>
                </div>
                <div class="summary-item">
                    <span>Slot Tersedia:</span>
                    <span id="availableCount">-</span>
                </div>
                <div class="summary-item">
                    <span>Slot Terisi:</span>
                    <span id="occupiedCount">-</span>
                </div>
                <div class="summary-item">
                    <span>Tingkat Okupansi:</span>
                    <span id="occupancyRate">-</span>
                </div>
            </div>

            <div class="last-update" id="lastUpdate">
                Terakhir diperbarui: -
            </div>
        </div>
    </div>

    <script>
        let isLoading = false;

        function showLoading() {
            document.getElementById('loading').classList.add('active');
            document.getElementById('checkButton').disabled = true;
            document.getElementById('checkButton').textContent = 'Mengecek...';
            isLoading = true;
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
            document.getElementById('checkButton').disabled = false;
            document.getElementById('checkButton').textContent = 'Cek Slot Parkir';
            isLoading = false;
        }

        function showError(message) {
            document.getElementById('errorText').textContent = message;
            document.getElementById('errorMessage').classList.add('active');
            setTimeout(() => {
                document.getElementById('errorMessage').classList.remove('active');
            }, 5000);
        }

        function formatDateTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleString('id-ID', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function renderSlots(data) {
            const slotsList = document.getElementById('slotsList');
            const noSlotsMessage = document.getElementById('noSlotsMessage');
            slotsList.innerHTML = '';

            // Cek apakah ada slot yang tersedia
            if (data.available_slots.length === 0) {
                // Tampilkan pesan jika tidak ada slot tersedia
                noSlotsMessage.classList.add('active');
                slotsList.style.display = 'none';
            } else {
                // Tampilkan hanya slot yang tersedia
                noSlotsMessage.classList.remove('active');
                slotsList.style.display = 'grid';
                
                // Render hanya slot yang tersedia
                data.available_slots.forEach(slotNumber => {
                    const slotDiv = document.createElement('div');
                    slotDiv.className = 'slot-item';
                    
                    slotDiv.innerHTML = `
                        <div class="slot-name">Slot Parkir ${slotNumber}</div>
                        <div class="slot-status">Tersedia</div>
                    `;
                    
                    slotsList.appendChild(slotDiv);
                });
            }

            // Update summary
            document.getElementById('availableCount').textContent = data.available_count;
            document.getElementById('occupiedCount').textContent = data.occupied_count;
            document.getElementById('occupancyRate').textContent = data.occupancy_rate + '%';
            document.getElementById('lastUpdate').textContent = 
                'Terakhir diperbarui: ' + formatDateTime(data.last_updated);

            // Show container
            document.getElementById('slotsContainer').classList.add('active');
        }

        async function checkParkingSlots() {
            if (isLoading) return;

            showLoading();
            document.getElementById('errorMessage').classList.remove('active');

            try {
                // First try to refresh detection
                await fetch('/api/refresh_detection');
                
                // Then get the latest data
                const response = await fetch('/api/available_slots');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                
                if (data.success) {
                    renderSlots(data);
                } else {
                    throw new Error(data.message || 'Gagal mendapatkan data slot parkir');
                }

            } catch (error) {
                console.error('Error:', error);
                showError('Gagal mengecek slot parkir. Pastikan server berjalan dan coba lagi.');
            } finally {
                hideLoading();
            }
        }

        // Auto refresh every 30 seconds when data is visible
        setInterval(() => {
            if (document.getElementById('slotsContainer').classList.contains('active') && !isLoading) {
                checkParkingSlots();
            }
        }, 30000);

        // Initial load message
        console.log('🚗 Parking Slot Checker Ready!');
        console.log('📡 API Endpoints:');
        console.log('   - /api/available_slots');
        console.log('   - /api/refresh_detection');
    </script>
</body>
</html>
