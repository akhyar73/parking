<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status Ruang Parkir</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background-color: #f5f5f5;
    }

    h1 {
      margin: 0 0 4px 0;
      font-size: 20px;
    }

    .meta {
      font-size: 12px;
      color: #555;
      margin-top: 2px;
    }

    .card {
      background-color: #ffffff;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 12px;
      margin-top: 12px;
    }

    .table-wrapper {
      width: 100%;
      overflow-x: auto;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 320px;
      font-size: 13px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 6px 8px;
      text-align: left;
    }

    th {
      background-color: #eee;
    }

    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 10px;
      font-size: 12px;
    }

    .full {
      background-color: #cc0000;
      color: #fff;
    }

    .empty {
      background-color: #008000;
      color: #fff;
    }

    .pending {
      background-color: #d98b00;
      color: #fff;
    }

    #no_data_msg {
      margin-top: 8px;
      font-size: 13px;
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }
      h1 {
        font-size: 18px;
      }
      table {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <h1>Status Ruang Parkir</h1>
  <p class="meta">Diperbarui: <span id="updated_at">-</span></p>
  <p class="meta">Halaman ini diperbarui otomatis setiap 1 detik.</p>

  <div class="card">
    <div class="table-wrapper">
      <table id="table_status" style="display:none;">
        <thead>
          <tr>
            <th>Nama Slot</th>
            <th>Status</th>
            <th>Timer (detik)</th>
          </tr>
        </thead>
        <tbody id="slots_body">
          <!-- diisi lewat JavaScript -->
        </tbody>
      </table>
    </div>
    <p id="no_data_msg">Belum ada data slot yang diterima dari server.</p>
  </div>

  <script>
    async function fetchStatus() {
      try {
        const res = await fetch("/api/parking-status");
        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        const data = await res.json();
        const updatedEl = document.getElementById("updated_at");
        const tableEl = document.getElementById("table_status");
        const bodyEl = document.getElementById("slots_body");
        const noDataEl = document.getElementById("no_data_msg");

        // jika belum ada slot
        if (!data || !data.slots || Object.keys(data.slots).length === 0) {
          updatedEl.textContent = "-";
          tableEl.style.display = "none";
          noDataEl.style.display = "block";
          return;
        }

        updatedEl.textContent = data.updated_at || "-";
        noDataEl.style.display = "none";
        tableEl.style.display = "table";

        // kosongkan isi tabel
        bodyEl.innerHTML = "";

        // isi ulang tabel
        for (const [name, info] of Object.entries(data.slots)) {
          const tr = document.createElement("tr");

          const tdName = document.createElement("td");
          tdName.textContent = name;
          tr.appendChild(tdName);

          const tdStatus = document.createElement("td");
          const span = document.createElement("span");
          span.classList.add("badge");

          if (info.state === "full") {
            span.classList.add("full");
            span.textContent = "FULL";
          } else if (info.state === "pending") {
            span.classList.add("pending");
            span.textContent = "PENDING";
          } else {
            span.classList.add("empty");
            span.textContent = "EMPTY";
          }

          tdStatus.appendChild(span);
          tr.appendChild(tdStatus);

          const tdTimer = document.createElement("td");
          const t = info.timer || 0;
          tdTimer.textContent = t.toFixed(2);
          tr.appendChild(tdTimer);

          bodyEl.appendChild(tr);
        }
      } catch (err) {
        console.error("Gagal mengambil data status:", err);
      }
    }

    // panggil pertama kali
    fetchStatus();
    // update setiap 1 detik
    setInterval(fetchStatus, 1000);
  </script>
</body>
</html>
